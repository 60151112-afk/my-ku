<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A股量化研究公开看板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #657286;
      --line: #d8dde6;
      --accent: #0969da;
      --accent-soft: #e8f2ff;
      --danger: #b42318;
      --warning: #a15c07;
      --ok: #067647;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      padding: 28px 0 22px;
      display: grid;
      gap: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 16px;
      font-size: 22px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 12px;
      font-size: 17px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
    }

    .muted {
      color: var(--muted);
    }

    .notice {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px solid #f4c790;
      background: #fff8ed;
      color: #6b3d03;
      border-radius: 8px;
    }

    main {
      padding: 24px 0 42px;
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .metrics {
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .metric,
    .section,
    .status-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 14px;
      min-height: 86px;
    }

    .metric .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric .value {
      font-size: 20px;
      font-weight: 700;
      word-break: break-word;
    }

    .status-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .status-card {
      padding: 14px;
    }

    .status-card strong {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 22px 0 16px;
    }

    .tab-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 13px;
      font: inherit;
      cursor: pointer;
    }

    .tab-button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .section {
      padding: 18px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #0756a4;
      font-size: 13px;
      white-space: nowrap;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: var(--panel);
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      word-break: break-word;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f0f3f7;
      color: #334155;
      font-weight: 700;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .bars {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(120px, 220px) 1fr 72px;
      gap: 10px;
      align-items: center;
      font-size: 14px;
    }

    .bar-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7ebf1;
    }

    .bar-fill {
      height: 100%;
      min-width: 2px;
      border-radius: 999px;
      background: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border-radius: 8px;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--panel);
      text-decoration: none;
      font-weight: 600;
    }

    .empty,
    .error {
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: var(--muted);
    }

    .error {
      border-color: #f0b4ad;
      background: #fff1f0;
      color: var(--danger);
    }

    footer {
      color: var(--muted);
      padding: 18px 0 28px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 980px) {
      .metrics,
      .status-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 20px, 1180px);
      }

      .topbar {
        padding: 22px 0 18px;
      }

      .metrics,
      .status-row {
        grid-template-columns: 1fr;
      }

      .section-head {
        display: grid;
      }

      .bar-row {
        grid-template-columns: 1fr;
      }

      table {
        min-width: 640px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>A股量化研究公开看板</h1>
        <p class="muted">静态公开版，展示已脱敏的本地研究快照。</p>
      </div>
      <div class="notice" id="public-notice">本页面仅用于量化研究展示，不构成投资建议。</div>
    </div>
  </header>

  <main class="wrap">
    <section>
      <h2>当前状态摘要</h2>
      <div class="grid metrics" id="metrics"></div>
      <div class="status-row" id="status-cards"></div>
    </section>

    <nav class="tabs" aria-label="公开看板分区">
      <button class="tab-button active" type="button" data-tab="overview">复盘总览</button>
      <button class="tab-button" type="button" data-tab="diagnostics">原因与诊断</button>
      <button class="tab-button" type="button" data-tab="risk">策略与风控</button>
      <button class="tab-button" type="button" data-tab="data">公开数据</button>
    </nav>

    <section id="content"></section>
  </main>

  <footer>
    <div class="wrap">只读公开快照。不包含刷新命令、券商连接、自动下单或本机路径。</div>
  </footer>

  <script>
    const DATA_URL = "public_data/dashboard_public_latest.json";
    const state = { bundle: null, activeTab: "overview" };

    const sectionGroups = {
      overview: ["daily_review", "next_trade_observation_review"],
      diagnostics: ["cause_aggregation", "data_pipeline"],
      risk: ["strategy_traffic_light", "loss_attribution", "health_score"],
      data: ["next_actions"]
    };

    function text(value, fallback = "-") {
      if (value === null || value === undefined || value === "") return fallback;
      if (typeof value === "number") {
        return Number.isInteger(value) ? String(value) : value.toFixed(2);
      }
      return String(value);
    }

    function percent(value) {
      if (value === null || value === undefined || value === "") return "-";
      const numeric = Number(value);
      if (!Number.isFinite(numeric)) return String(value);
      return `${(numeric <= 1 ? numeric * 100 : numeric).toFixed(1)}%`;
    }

    function escapeHtml(value) {
      return text(value, "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderMetric(label, value, formatter = text) {
      return `
        <article class="metric">
          <div class="label">${escapeHtml(label)}</div>
          <div class="value">${escapeHtml(formatter(value))}</div>
        </article>
      `;
    }

    function renderMetrics(bundle) {
      const summary = bundle.summary || {};
      document.getElementById("metrics").innerHTML = [
        renderMetric("面板状态", summary.dashboard_status),
        renderMetric("行情日期", summary.quote_date),
        renderMetric("入选数量", summary.selected_count),
        renderMetric("首要原因", summary.top_cause),
        renderMetric("原因占比", summary.top_cause_ratio, percent),
        renderMetric("健康分", summary.health_score)
      ].join("");

      document.getElementById("status-cards").innerHTML = [
        ["数据状态", bundle.source_status],
        ["策略红绿灯", summary.traffic_light],
        ["数据链路", summary.pipeline_status],
        ["生成时间", bundle.generated_at]
      ].map(([label, value]) => `
        <article class="status-card">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(value)}</span>
        </article>
      `).join("");
    }

    function valueScore(row) {
      const numericEntries = Object.entries(row || {})
        .map(([key, value]) => [key, Number(value)])
        .filter(([, value]) => Number.isFinite(value));
      if (!numericEntries.length) return null;
      return numericEntries[0];
    }

    function renderBars(rows) {
      const scored = rows
        .map((row) => {
          const score = valueScore(row);
          if (!score) return null;
          const label = Object.entries(row).find(([, value]) => typeof value === "string")?.[1] || "项目";
          return { label, key: score[0], value: score[1] };
        })
        .filter(Boolean)
        .slice(0, 8);
      if (!scored.length) return "";
      const maxValue = Math.max(...scored.map((item) => Math.abs(item.value)), 1);
      return `
        <div class="bars" aria-label="原因分布图">
          ${scored.map((item) => `
            <div class="bar-row">
              <div>${escapeHtml(item.label)}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100, Math.abs(item.value) / maxValue * 100)}%"></div></div>
              <div>${escapeHtml(item.value)}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTable(rows) {
      if (!Array.isArray(rows) || !rows.length) {
        return `<div class="empty">当前快照没有可展示明细。</div>`;
      }
      const columns = Array.from(new Set(rows.flatMap((row) => Object.keys(row || {})))).slice(0, 14);
      return `
        <div class="table-wrap">
          <table>
            <thead><tr>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("")}</tr></thead>
            <tbody>
              ${rows.slice(0, 120).map((row) => `
                <tr>${columns.map((column) => `<td>${escapeHtml(row[column])}</td>`).join("")}</tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderSection(key, section) {
      const summary = section.summary || {};
      const rows = Array.isArray(section.rows) ? section.rows : [];
      const maybeBars = key === "cause_aggregation" ? renderBars(rows) : "";
      return `
        <article class="section">
          <div class="section-head">
            <div>
              <h3>${escapeHtml(section.title || key)}</h3>
              <p class="muted">状态：${escapeHtml(summary.status_label || summary.status)} · 行情日期：${escapeHtml(summary.quote_date || summary.review_date)} · 记录数：${escapeHtml(rows.length)}</p>
            </div>
            <span class="pill">${escapeHtml(section.load_status || "unknown")}</span>
          </div>
          ${section.load_error ? `<div class="error">${escapeHtml(section.load_error)}</div>` : ""}
          ${maybeBars}
          ${renderTable(rows)}
        </article>
      `;
    }

    function renderContent() {
      const bundle = state.bundle;
      const content = document.getElementById("content");
      if (!bundle) {
        content.innerHTML = `<div class="error">公开数据尚未载入。</div>`;
        return;
      }
      if (state.activeTab === "data") {
        const cards = Array.isArray(bundle.cards) ? bundle.cards : [];
        content.innerHTML = `
          <article class="section">
            <div class="section-head">
              <div>
                <h3>公开数据</h3>
                <p class="muted">下载的 JSON 为脱敏快照，可直接用于静态部署。</p>
              </div>
              <span class="pill">${escapeHtml(bundle.source_status)}</span>
            </div>
            <div class="actions">
              <a class="button-link" href="${DATA_URL}" download>下载公开快照 JSON</a>
            </div>
          </article>
          ${renderTable(cards)}
        `;
        return;
      }
      const sections = bundle.sections || {};
      const keys = sectionGroups[state.activeTab] || [];
      const html = keys
        .filter((key) => sections[key])
        .map((key) => renderSection(key, sections[key]))
        .join("");
      content.innerHTML = html || `<div class="empty">当前分区没有数据。</div>`;
    }

    function bindTabs() {
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = button.dataset.tab;
          document.querySelectorAll(".tab-button").forEach((item) => item.classList.toggle("active", item === button));
          renderContent();
        });
      });
    }

    async function boot() {
      bindTabs();
      try {
        const response = await fetch(DATA_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        state.bundle = await response.json();
        const notice = state.bundle.public_notice || {};
        document.getElementById("public-notice").textContent = notice.body || "本页面仅用于量化研究展示，不构成投资建议。";
        renderMetrics(state.bundle);
        renderContent();
      } catch (error) {
        document.getElementById("content").innerHTML = `<div class="error">无法读取公开快照：${escapeHtml(error.message || error)}</div>`;
      }
    }

    boot();
  </script>
</body>
</html>
